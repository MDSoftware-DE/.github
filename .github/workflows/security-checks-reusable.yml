name: security-checks (reusable)

on:
  workflow_call:
    inputs:
      run_dependency_review:
        description: Run dependency review on pull requests
        required: false
        default: true
        type: boolean
      run_codeql:
        description: Run CodeQL analysis only for public repositories or repositories licensed for GitHub Code Security
        required: false
        default: true
        type: boolean
      run_semgrep:
        description: Run free Semgrep Community Edition analysis with local SARIF enforcement
        required: false
        default: false
        type: boolean
      semgrep_config:
        description: Semgrep Community Edition registry configuration
        required: false
        default: "p/default"
        type: string
      fail_on_semgrep_findings:
        description: Fail the Semgrep job when the locally generated SARIF contains new findings
        required: false
        default: true
        type: boolean
      upload_gitleaks_sarif:
        description: Upload gitleaks SARIF only when GitHub Code Security is available
        required: false
        default: true
        type: boolean
      run_secret_scan:
        description: Run secret scan with gitleaks
        required: false
        default: true
        type: boolean
      codeql_languages:
        description: "Comma-separated CodeQL languages (supported in baseline: javascript-typescript,python)"
        required: false
        default: "javascript-typescript,python"
        type: string
      fail_on_secret_findings:
        description: Fail job when gitleaks findings are present
        required: false
        default: true
        type: boolean
      dependency_fail_on_severity:
        description: Minimum severity for dependency review failure
        required: false
        default: high
        type: string
      runner_labels:
        description: JSON string or array for the runner selection, for example '"ubuntu-latest"' or '["self-hosted","nightcrawler"]'
        required: false
        default: '"ubuntu-latest"'
        type: string

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    if: ${{ inputs.run_dependency_review && github.event_name == 'pull_request' }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: ${{ inputs.dependency_fail_on_severity }}

  resolve-codeql-languages:
    name: resolve-codeql-languages
    if: ${{ inputs.run_codeql }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    outputs:
      has_languages: ${{ steps.resolve.outputs.has_languages }}
      languages: ${{ steps.resolve.outputs.languages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve CodeQL languages from repository
        id: resolve
        shell: bash
        env:
          CODEQL_LANGUAGES: ${{ inputs.codeql_languages }}
        run: |
          set -euo pipefail

          normalize() {
            printf "%s" "$1" | tr '[:upper:]' '[:lower:]' | sed 's/^ *//;s/ *$//'
          }

          has_js=false
          has_py=false

          if git ls-files '*.js' '*.jsx' '*.mjs' '*.cjs' '*.ts' '*.tsx' | grep -q '.'; then
            has_js=true
          fi
          if git ls-files '*.py' | grep -q '.'; then
            has_py=true
          fi

          include_js=false
          include_py=false

          IFS=',' read -r -a requested <<< "${CODEQL_LANGUAGES}"
          for raw in "${requested[@]}"; do
            lang="$(normalize "$raw")"
            case "$lang" in
              javascript-typescript)
                if [[ "$has_js" == "true" ]]; then
                  include_js=true
                fi
                ;;
              python)
                if [[ "$has_py" == "true" ]]; then
                  include_py=true
                fi
                ;;
            esac
          done

          languages=()
          if [[ "$include_js" == "true" ]]; then
            languages+=("javascript-typescript")
          fi
          if [[ "$include_py" == "true" ]]; then
            languages+=("python")
          fi

          if [[ "${#languages[@]}" -eq 0 ]]; then
            echo "has_languages=false" >> "$GITHUB_OUTPUT"
            echo "languages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          languages_json="$(printf '%s\n' "${languages[@]}" | jq -R . | jq -s -c .)"
          echo "has_languages=true" >> "$GITHUB_OUTPUT"
          echo "languages=${languages_json}" >> "$GITHUB_OUTPUT"

  codeql:
    name: codeql (${{ matrix.language }})
    needs: resolve-codeql-languages
    if: ${{ inputs.run_codeql && needs.resolve-codeql-languages.outputs.has_languages == 'true' }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.resolve-codeql-languages.outputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: semgrep
    if: ${{ inputs.run_semgrep }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    container:
      image: semgrep/semgrep:1.170.0
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Semgrep SARIF fail control
        shell: bash
        run: |
          set -euo pipefail
          control_dir="$(mktemp -d)"
          trap 'rm -rf "${control_dir}"' EXIT

          cat > "${control_dir}/rule.yml" <<'YAML'
          rules:
            - id: md-control-eval
              languages:
                - python
              message: Synthetic control finding
              severity: ERROR
              pattern: eval(...)
          YAML
          printf '%s\n' 'user_input = "control"' 'eval(user_input)' > "${control_dir}/fixture.py"
          semgrep scan \
            --config "${control_dir}/rule.yml" \
            --sarif \
            --output "${control_dir}/control.sarif" \
            --metrics off \
            "${control_dir}/fixture.py"
          python3 - "${control_dir}/control.sarif" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              report = json.load(handle)
          findings = sum(len(run.get("results", [])) for run in report.get("runs", []))
          if findings != 1:
              raise SystemExit(f"expected exactly one synthetic Semgrep finding, found {findings}")
          print("Synthetic Semgrep SARIF control: 1 finding")
          PY

      - name: Run Semgrep CE
        shell: bash
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          args=(
            scan
            --config "${SEMGREP_CONFIG}"
            --sarif
            --output semgrep.sarif
            --metrics off
          )
          if [[ "${{ github.event_name }}" == "pull_request" && -n "${PR_BASE_SHA}" ]]; then
            args+=(--baseline-commit "${PR_BASE_SHA}")
          fi
          args+=(.)
          semgrep "${args[@]}"

      - name: Enforce Semgrep SARIF findings
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        shell: bash
        env:
          FAIL_ON_SEMGREP_FINDINGS: ${{ inputs.fail_on_semgrep_findings }}
        run: |
          set -euo pipefail
          python3 - semgrep.sarif "${FAIL_ON_SEMGREP_FINDINGS}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              report = json.load(handle)
          findings = sum(len(run.get("results", [])) for run in report.get("runs", []))
          print(f"Semgrep findings: {findings}")
          if sys.argv[2].lower() == "true" and findings:
              raise SystemExit("Failing due to Semgrep findings.")
          PY

  secret-scan:
    name: secret-scan
    if: ${{ inputs.run_secret_scan }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          GL_TMP="$(mktemp -d)"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o "$GL_TMP/gitleaks.tgz"
          tar -xzf "$GL_TMP/gitleaks.tgz" -C "$GL_TMP"
          mkdir -p "$HOME/.local/bin"
          install -m 0755 "$GL_TMP/gitleaks" "$HOME/.local/bin/gitleaks"
          rm -rf "$GL_TMP"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      - name: Run gitleaks
        shell: bash
        run: |
          set -euo pipefail
          gitleaks dir . --redact --report-format sarif --report-path gitleaks.sarif

      - name: Upload SARIF
        if: ${{ inputs.upload_gitleaks_sarif && always() && hashFiles('gitleaks.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Enforce findings policy
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        shell: bash
        env:
          FAIL_ON_SECRET_FINDINGS: ${{ inputs.fail_on_secret_findings }}
        run: |
          set -euo pipefail
          findings="$(jq '[.runs[].results[]?] | length' gitleaks.sarif)"
          echo "Secret findings: ${findings}"
          if [[ "${FAIL_ON_SECRET_FINDINGS}" == "true" && "${findings}" -gt 0 ]]; then
            echo "Failing due to secret findings."
            exit 1
          fi
